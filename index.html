<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Python Rock Paper Scissors</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; }
        .btn { padding: 10px 20px; font-size: 18px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; }
        .rock { background: #e74c3c; color: white; }
        .paper { background: #ecf0f1; color: #2c3e50; }
        .scissors { background: #3498db; color: white; }
        #output { background: #1a1a1a; color: #00ff00; padding: 20px; width: 60%; margin: 20px auto; border-radius: 10px; text-align: left; min-height: 150px; }
    </style>
</head>
<body>

    <h1>Rock, Paper, Scissors (Python)</h1>
    <p>აირჩიეთ ერთ-ერთი:</p>

    <button class="btn rock" py-click="play_game('rock')">Rock</button>
    <button class="btn paper" py-click="play_game('paper')">Paper</button>
    <button class="btn scissors" py-click="play_game('scissors')">Scissors</button>

    <div id="output">დააჭირეთ ღილაკს თამაშის დასაწყებად...</div>

    <script type="py">
import random
from pyscript import display

options = ['rock', 'paper', 'scissors']

def play_game(user_choice):
    computer_choice = random.choice(options)
    result = ""

    if user_choice == computer_choice:
        result = "ფრეა! 🤝"
    elif (user_choice == 'rock' and computer_choice == 'scissors') or \
         (user_choice == 'paper' and computer_choice == 'rock') or \
         (user_choice == 'scissors' and computer_choice == 'paper'):
        result = "თქვენ მოიგეთ! 🎉"
    else:
        result = "თქვენ წააგეთ! 🤖"

    # შედეგის გამოტანა ეკრანზე
    output_text = f"თქვენი არჩევანი: {user_choice.upper()}\n"
    output_text += f"კომპიუტერის არჩევანი: {computer_choice.upper()}\n"
    output_text += f"შედეგი: {result}\n"
    output_text += "------------------------"
    
    display(output_text, target="output", append=False)
    </script>

</body>
</html>
