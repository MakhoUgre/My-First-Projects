<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors - Fast & Reliable</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a1a2e; color: #ffffff; padding: 40px; }
        .container { background: #16213e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: inline-block; }
        .btn { padding: 15px 25px; font-size: 20px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; transition: 0.3s; font-weight: bold; }
        .rock { background: #e94560; color: white; }
        .paper { background: #0f3460; color: white; border: 1px solid #533483; }
        .scissors { background: #533483; color: white; }
        .btn:hover { transform: scale(1.1); opacity: 0.9; }
        #output { background: #0f3460; color: #00d4ff; padding: 20px; width: 300px; margin: 20px auto; border-radius: 10px; text-align: left; border: 1px solid #533483; font-family: monospace; min-height: 100px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Rock, Paper, Scissors</h1>
        <p>აირჩიეთ ერთ-ერთი და ითამაშეთ!</p>

        <button class="btn rock" onclick="playGame('rock')">Rock</button>
        <button class="btn paper" onclick="playGame('paper')">Paper</button>
        <button class="btn scissors" onclick="playGame('scissors')">Scissors</button>

        <div id="output">დააჭირეთ ღილაკს...</div>
    </div>

    <script>
        const options = ['rock', 'paper', 'scissors'];

        function playGame(userChoice) {
            // კომპიუტერის არჩევანი (ზუსტად ისე, როგორც Python-ის random.choice)
            const computerChoice = options[Math.floor(Math.random() * options.length)];
            let result = "";

            if (userChoice === computerChoice) {
                result = "ფრეა! 🤝";
            } else if (
                (userChoice === 'rock' && computerChoice === 'scissors') ||
                (userChoice === 'paper' && computerChoice === 'rock') ||
                (userChoice === 'scissors' && computerChoice === 'paper')
            ) {
                result = "თქვენ მოიგეთ! 🎉";
            } else {
                result = "თქვენ წააგეთ! 🤖";
            }

            // შედეგის გამოტანა ეკრანზე
            document.getElementById('output').innerHTML = `
                თქვენ: <b>${userChoice.toUpperCase()}</b><br>
                კომპიუტერი: <b>${computerChoice.toUpperCase()}</b><br><br>
                შედეგი: <span style="color: white">${result}</span>
            `;
        }
    </script>

</body>
</html>
